name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Decode & authenticate
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RAWAL_HOSPITAL }}' > $HOME/firebase-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-sa.json" >> $GITHUB_ENV
          gcloud auth activate-service-account --key-file=$HOME/firebase-sa.json 2>&1 || echo "GCLOUD_AUTH_WARN: gcloud not available, will try ADC"
          gcloud config set project rawal-hospital 2>&1 || true

      - name: Install firebase-tools
        run: npm install -g firebase-tools 2>&1

      - name: Authenticate Firebase
        run: npx firebase projects:list --non-interactive 2>&1

      - name: Build backend
        run: |
          cd backend
          npm install
          npx prisma generate
          npm run build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || '' }}

      - name: Install & build Firebase functions
        run: |
          cd firebase/functions
          npm install
          npx prisma generate --schema=../../backend/prisma/schema.prisma
          npm run build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: Deploy to Firebase
        continue-on-error: true
        shell: bash
        run: |
          cd firebase/functions
          echo "=== 1. Deploy api function with gcloud ==="
          gcloud functions deploy api \
            --gen2 \
            --runtime nodejs20 \
            --trigger-http \
            --allow-unauthenticated \
            --entry-point api \
            --source . \
            --project rawal-hospital \
            --quiet 2>&1
          echo "GCLOUD_FUNCTIONS_EXIT: $?"
          echo "=== 2. List deployed functions ==="
          gcloud functions list --project rawal-hospital 2>&1
          echo "GCLOUD_LIST_EXIT: $?"

      - name: Notify deployment success
        if: success()
        run: echo "Rawal Hospital deployed to Firebase successfully!"
