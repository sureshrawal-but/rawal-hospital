name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Decode Firebase service account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RAWAL_HOSPITAL }}' > $HOME/firebase-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-sa.json" >> $GITHUB_ENV

      - name: Install backend dependencies
        shell: bash
        run: |
          cd backend
          npm install 2>&1

      - name: Prisma generate
        shell: bash
        run: |
          cd backend
          npx prisma generate 2>&1
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: Build backend (TypeScript)
        shell: bash
        run: |
          set +e
          cd backend
          npx tsc > /tmp/tsc-output.txt 2>&1
          tsc_exit=$?
          echo "=== tsc exit code: $tsc_exit ==="
          echo "=== Build output start ==="
          cat /tmp/tsc-output.txt
          echo "=== Build output end ==="
          if [ $tsc_exit -ne 0 ]; then
            echo "tsc compilation failed"
            exit $tsc_exit
          fi

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install 2>&1

      - name: Build frontend
        shell: bash
        run: |
          set +e
          cd frontend
          npx next build > /tmp/next-build.log 2>&1
          build_exit=$?
          echo "=== BUILD EXIT CODE: $build_exit ==="
          echo "=== LAST 200 LINES OF BUILD OUTPUT ==="
          tail -200 /tmp/next-build.log
          echo "=== END BUILD OUTPUT ==="
          if [ $build_exit -ne 0 ]; then
            exit $build_exit
          fi
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://us-central1-rawal-hospital.cloudfunctions.net/api/api/v1' }}

      - name: Install & build Firebase functions
        run: |
          cd firebase/functions
          npm install
          npx prisma generate --schema=../../backend/prisma/schema.prisma
          npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RAWAL_HOSPITAL }}
          channelId: live
          projectId: rawal-hospital
          entryPoint: ./firebase

      - name: Deploy Firebase Functions
        run: |
          cd firebase
          npx firebase deploy --only functions --project rawal-hospital --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: $HOME/firebase-sa.json

      - name: Deploy Firebase Storage & Firestore rules
        run: |
          cd firebase
          npx firebase deploy --only storage,firestore:rules --project rawal-hospital --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: $HOME/firebase-sa.json

      - name: Notify deployment success
        if: success()
        run: echo "✅ Rawal Hospital deployed to Firebase successfully!"
