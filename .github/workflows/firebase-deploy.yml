name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Decode Firebase service account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RAWAL_HOSPITAL }}' > $HOME/firebase-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-sa.json" >> $GITHUB_ENV

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Prisma generate
        run: |
          cd backend
          npx prisma generate
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: Build backend
        run: |
          cd backend
          npm run build

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install 2>&1

      - name: Build frontend (with log capture)
        shell: bash
        run: |
          cd frontend
          set +e
          npm run build 2>&1 | tee ../frontend-build.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          exit $EXIT_CODE
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || '' }}

      - name: Output build log to summary
        if: always()
        shell: bash
        run: |
          if [ -f frontend-build.log ]; then
            echo '## Frontend Build Log' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat frontend-build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo 'No build log found' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload frontend build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-log
          path: frontend-build.log

      - name: Install & build Firebase functions
        run: |
          cd firebase/functions
          npm install 2>&1
          npx prisma generate --schema=../../backend/prisma/schema.prisma 2>&1
          npm run build 2>&1
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: Deploy to Firebase Hosting
        if: success()
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RAWAL_HOSPITAL }}
          channelId: live
          projectId: rawal-hospital
          entryPoint: ./firebase

      - name: Deploy Firebase Functions
        if: success()
        run: |
          cd firebase
          npx firebase deploy --only functions --project rawal-hospital --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: $HOME/firebase-sa.json

      - name: Deploy Firebase Storage & Firestore rules
        if: success()
        run: |
          cd firebase
          npx firebase deploy --only storage,firestore:rules --project rawal-hospital --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: $HOME/firebase-sa.json

      - name: Notify deployment success
        if: success()
        run: echo "Rawal Hospital deployed to Firebase successfully!"
