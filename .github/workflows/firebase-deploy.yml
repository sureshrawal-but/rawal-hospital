name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Authenticate with Google Cloud
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RAWAL_HOSPITAL }}' > $HOME/firebase-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-sa.json" >> $GITHUB_ENV
          gcloud auth activate-service-account --key-file=$HOME/firebase-sa.json
          gcloud config set project rawal-hospital

      - name: Build backend
        run: |
          cd backend
          npm install
          npx prisma generate
          npm run build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || '' }}

      - name: Install & build Firebase functions
        run: |
          cd firebase/functions
          npm install
          npx prisma generate --schema=../../backend/prisma/schema.prisma
          npm run build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: Deploy Cloud Function
        continue-on-error: true
        shell: bash
        run: |
          cd firebase/functions
          gcloud functions deploy api \
            --gen2 \
            --runtime nodejs20 \
            --trigger-http \
            --allow-unauthenticated \
            --entry-point api \
            --source . \
            --project rawal-hospital \
            --quiet 2>&1

      - name: Show Function URL
        continue-on-error: true
        shell: bash
        run: |
          echo "=== All functions ==="
          gcloud functions list --project rawal-hospital 2>&1
          echo "=== API function details ==="
          gcloud functions describe api --region us-central1 --project rawal-hospital --format="json" 2>&1 || gcloud functions describe api --region us-east1 --project rawal-hospital --format="json" 2>&1

      - name: Test API Health
        continue-on-error: true
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code} -> %{redirect_url}\n" https://us-central1-rawal-hospital.cloudfunctions.net/api/api/health 2>&1 || true

      - name: Build & Deploy Firebase Hosting
        continue-on-error: true
        run: |
          cd firebase
          echo "=== Creating hosting site if needed ==="
          npx firebase hosting:sites:create rawal-hospital --project rawal-hospital --non-interactive 2>&1 || echo "Site may already exist"
          echo "=== Deploying hosting ==="
          npx firebase deploy --only hosting --project rawal-hospital --non-interactive 2>&1
          echo "=== Hosting URLs ==="
          npx firebase hosting:channel:list --project rawal-hospital --non-interactive 2>&1 || true

      - name: Deploy Storage & Firestore rules
        continue-on-error: true
        run: |
          npx firebase deploy --only storage,firestore:rules --project rawal-hospital --non-interactive 2>&1

      - name: Run database migrations
        run: |
          cd backend
          npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed database
        continue-on-error: true
        run: |
          cd backend
          npx prisma db seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Notify deployment success
        if: success()
        run: echo "Rawal Hospital deployed to Firebase successfully!"
