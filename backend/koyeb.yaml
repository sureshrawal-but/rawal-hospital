name: rawal-hospital-api
services:
  - name: api
    type: web
    instance_count: 1
    ports:
      - port: 5000
    health_checks:
      - path: /api/health
    routes:
      - path: /
    build:
      builder: NIXPACKS
      build_command: npm install && npm run build
      run_command: node dist/index.js
    source:
      provider: github
      repository: sureshrawal-but/rawal-hospital
      branch: main
      directory: backend
